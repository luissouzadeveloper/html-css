<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens adaptativas</title>
</head>
<body>
    <h1>Adaptando imagens</h1>
    
    <picture>
        <source media="(max-width: 700px)" srcset="img/carro-P.jpg" type="image/jpg">
        <source media="(max-width: 1050px)" srcset="img/carro-M.jpg" type="image/jpg">
        <img src="img/carro-G.jpg" alt="Imagen grande">
    </picture>
</body>
</html>
