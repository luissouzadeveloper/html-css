<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptação de imagens</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir esse site em vários dispositvos diferentes
        ou aumente e diminua o tamanho do seu navegador
    </p>

    <picture>
        <source media="(max-width: 750px)" srcset="img/img-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="img/img-m.png" type="image/png">
        <img src="img/img-g.png" alt="Imagem adaptativa">
    </picture>

    <hr>

    <h1>Reproduzindo áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML 5</p>
    <audio src="midia/Tak - Bobby Richards.mp3" controls autoplay></audio>
    <!--MP3, OGG e WAV = Compatibilidade com todos os navegadores-->
    <audio preload="metadata" controls>
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/Tak - Bobby Richards.ogg" type="audio/ogg">
        <source src="midia/Two Moons - Bobby Richards.wav" type="audio/wav"> <!--Wav é pesado-->
    </audio>
</body>
</html>
